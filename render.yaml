# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: complyscan
    runtime: docker
    region: singapore
    plan: free
    envVars:
      - key: CF_API_TOKEN
        sync: false  # Set in Render Dashboard
      - key: CF_ACCOUNT_ID
        sync: false
      - key: CF_LLM_MODEL
        value: "@cf/meta/llama-3.1-8b-instruct"
